# -------------------------------
# Common Environment Variables
# -------------------------------
x-splunk-env: &splunk-env
  SPLUNK_PASSWORD: ${SPLUNK_PASSWORD}
  SPLUNK_GENERAL_TERMS: "--accept-sgt-current-at-splunk-com"
  SPLUNK_START_ARGS: "--accept-license"

# -------------------------------
# Common Service Configuration
# -------------------------------
x-splunk-common: &splunk-common
  image: splunk/splunk:9.0.3-openjdk11
  restart: unless-stopped
  networks:
    - skynet
  tty: true
  stdin_open: true

services:
  # -------------------------------
  # Cluster Manager (CM)
  # -------------------------------
  cm1:
    <<: *splunk-common
    hostname: cm1
    ports:
      - "8001:8000"
    environment:
      <<: *splunk-env
      SPLUNK_ROLE: splunk_cluster_master
      SPLUNK_IDXC_SECRET: ${SPLUNK_IDXC_SECRET}
      SPLUNK_INDEXER_URL: idx1,idx2,idx3
    volumes:
      - cm1_etc:/opt/splunk/etc
      - cm1_var:/opt/splunk/var

  # -------------------------------
  # Indexers
  # -------------------------------
  idx1:
    <<: *splunk-common
    hostname: idx1
    ports:
      - "8002:8000"
    environment:
      <<: *splunk-env
      SPLUNK_ROLE: splunk_indexer
      SPLUNK_CLUSTER_MASTER_URL: cm1
      SPLUNK_IDXC_SECRET: ${SPLUNK_IDXC_SECRET}
    volumes:
      - idx1_etc:/opt/splunk/etc
      - idx1_var:/opt/splunk/var

  idx2:
    <<: *splunk-common
    hostname: idx2
    ports:
      - "8003:8000"
    environment:
      <<: *splunk-env
      SPLUNK_ROLE: splunk_indexer
      SPLUNK_CLUSTER_MASTER_URL: cm1
      SPLUNK_IDXC_SECRET: ${SPLUNK_IDXC_SECRET}
    volumes:
      - idx2_etc:/opt/splunk/etc
      - idx2_var:/opt/splunk/var

  idx3:
    <<: *splunk-common
    hostname: idx3
    ports:
      - "8004:8000"
    environment:
      <<: *splunk-env
      SPLUNK_ROLE: splunk_indexer
      SPLUNK_CLUSTER_MASTER_URL: cm1
      SPLUNK_IDXC_SECRET: ${SPLUNK_IDXC_SECRET}
    volumes:
      - idx3_etc:/opt/splunk/etc
      - idx3_var:/opt/splunk/var

  # -------------------------------
  # Search Head Cluster
  # -------------------------------
  sh1:
    <<: *splunk-common
    hostname: sh1
    ports:
      - "8005:8000"
    environment:
      <<: *splunk-env
      SPLUNK_ROLE: splunk_search_head
      SPLUNK_SEARCH_HEAD_URL: sh1,sh2,sh3
      SPLUNK_SEARCH_HEAD_CAPTAIN_URL: sh1
      SPLUNK_SHC_SECRET: ${SPLUNK_SHC_SECRET}
      SPLUNK_DEPLOYER_URL: dep1
      SPLUNK_INDEXER_URL: idx1,idx2,idx3
      SPLUNK_CLUSTER_MASTER_URL: cm1
      SPLUNK_IDXC_SECRET: ${SPLUNK_IDXC_SECRET}
    volumes:
      - sh1_etc:/opt/splunk/etc
      - sh1_var:/opt/splunk/var

  sh2:
    <<: *splunk-common
    hostname: sh2
    ports:
      - "8006:8000"
    environment:
      <<: *splunk-env
      SPLUNK_ROLE: splunk_search_head
      SPLUNK_SEARCH_HEAD_URL: sh1,sh2,sh3
      SPLUNK_SEARCH_HEAD_CAPTAIN_URL: sh1
      SPLUNK_SHC_SECRET: ${SPLUNK_SHC_SECRET}
      SPLUNK_DEPLOYER_URL: dep1
      SPLUNK_INDEXER_URL: idx1,idx2,idx3
      SPLUNK_CLUSTER_MASTER_URL: cm1
      SPLUNK_IDXC_SECRET: ${SPLUNK_IDXC_SECRET}
    volumes:
      - sh2_etc:/opt/splunk/etc
      - sh2_var:/opt/splunk/var

  sh3:
    <<: *splunk-common
    hostname: sh3
    ports:
      - "8007:8000"
    environment:
      <<: *splunk-env
      SPLUNK_ROLE: splunk_search_head
      SPLUNK_SEARCH_HEAD_URL: sh1,sh2,sh3
      SPLUNK_SEARCH_HEAD_CAPTAIN_URL: sh1
      SPLUNK_SHC_SECRET: ${SPLUNK_SHC_SECRET}
      SPLUNK_DEPLOYER_URL: dep1
      SPLUNK_INDEXER_URL: idx1,idx2,idx3
      SPLUNK_CLUSTER_MASTER_URL: cm1
      SPLUNK_IDXC_SECRET: ${SPLUNK_IDXC_SECRET}
    volumes:
      - sh3_etc:/opt/splunk/etc
      - sh3_var:/opt/splunk/var

  # -------------------------------
  # Deployer
  # -------------------------------
  dep1:
    <<: *splunk-common
    hostname: dep1
    ports:
      - "8008:8000"
    environment:
      <<: *splunk-env
      SPLUNK_ROLE: splunk_deployer
      SPLUNK_SHC_SECRET: ${SPLUNK_SHC_SECRET}
      SPLUNK_SEARCH_HEAD_URL: sh1,sh2,sh3
      SPLUNK_INDEXER_URL: idx1,idx2,idx3
    volumes:
      - dep1_etc:/opt/splunk/etc
      - dep1_var:/opt/splunk/var

# -------------------------------
# Networks
# -------------------------------
networks:
  skynet:
    driver: bridge

# -------------------------------
# Volumes
# -------------------------------
volumes:
  cm1_etc:
  cm1_var:
  idx1_etc:
  idx1_var:
  idx2_etc:
  idx2_var:
  idx3_etc:
  idx3_var:
  sh1_etc:
  sh1_var:
  sh2_etc:
  sh2_var:
  sh3_etc:
  sh3_var:
  dep1_etc:
  dep1_var:
