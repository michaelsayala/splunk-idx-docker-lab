services:
  # -------------------------------
  # Cluster Master (CM)
  # -------------------------------
  cm1:
    image: splunk/splunk:9.0.3-openjdk11
    container_name: cm1
    hostname: cm1
    networks:
      - skynet
    ports:
      - "8001:8000"
      - "8091:8089"
    environment:
      SPLUNK_PASSWORD: ${SPLUNK_PASSWORD}
      SPLUNK_GENERAL_TERMS: "--accept-sgt-current-at-splunk-com"
      SPLUNK_START_ARGS: "--accept-license"
      SPLUNK_ROLE: splunk_cluster_master
      SPLUNK_IDXC_SECRET: ${SPLUNK_IDXC_SECRET}
      SPLUNK_INDEXER_URL: idx1,idx2,idx3
    volumes:
    - cm1_etc:/opt/splunk/etc
    - cm1_var:/opt/splunk/var
    tty: true
    stdin_open: true
    restart: unless-stopped
  # -------------------------------
  # Indexer 1
  # -------------------------------
  idx1:
    image: splunk/splunk:9.0.3-openjdk11
    container_name: idx1
    hostname: idx1
    networks:
      - skynet
    ports:
      - "8002:8000"
      - "8092:8089"
      - "9997"
    environment:
      SPLUNK_PASSWORD: ${SPLUNK_PASSWORD}
      SPLUNK_GENERAL_TERMS: "--accept-sgt-current-at-splunk-com"
      SPLUNK_START_ARGS: "--accept-license"
      SPLUNK_ROLE: splunk_indexer
      SPLUNK_CLUSTER_MASTER_URL: cm1
      SPLUNK_IDXC_SECRET: ${SPLUNK_IDXC_SECRET}
    volumes:
    - idx1_etc:/opt/splunk/etc
    - idx1_var:/opt/splunk/var
    tty: true
    stdin_open: true
    restart: unless-stopped
  # -------------------------------
  # Indexer 2
  # -------------------------------
  idx2:
    image: splunk/splunk:9.0.3-openjdk11
    container_name: idx2
    hostname: idx2
    networks:
      - skynet
    ports:
      - "8003:8000"
      - "8093:8089"
      - "9997"
    environment:
      SPLUNK_PASSWORD: ${SPLUNK_PASSWORD}
      SPLUNK_GENERAL_TERMS: "--accept-sgt-current-at-splunk-com"
      SPLUNK_START_ARGS: "--accept-license"
      SPLUNK_ROLE: splunk_indexer
      SPLUNK_CLUSTER_MASTER_URL: cm1
      SPLUNK_IDXC_SECRET: ${SPLUNK_IDXC_SECRET}
    volumes:
    - idx2_etc:/opt/splunk/etc
    - idx2_var:/opt/splunk/var
    tty: true
    stdin_open: true
    restart: unless-stopped
  # -------------------------------
  # Indexer 3
  # -------------------------------
  idx3:
    image: splunk/splunk:9.0.3-openjdk11
    container_name: idx3
    hostname: idx3
    networks:
      - skynet
    ports:
      - "8004:8000"
      - "8094:8089"
      - "9997"
    environment:
      SPLUNK_PASSWORD: ${SPLUNK_PASSWORD}
      SPLUNK_GENERAL_TERMS: "--accept-sgt-current-at-splunk-com"
      SPLUNK_START_ARGS: "--accept-license"
      SPLUNK_ROLE: splunk_indexer
      SPLUNK_CLUSTER_MASTER_URL: cm1
      SPLUNK_IDXC_SECRET: ${SPLUNK_IDXC_SECRET}
    volumes:
    - idx3_etc:/opt/splunk/etc
    - idx3_var:/opt/splunk/var
    tty: true
    stdin_open: true
    restart: unless-stopped
  # -------------------------------
  # Search Head 1
  # -------------------------------
  sh1:
    image: splunk/splunk:9.0.3-openjdk11
    container_name: sh1
    hostname: sh1
    networks:
      - skynet
    ports:
      - "8005:8000"
      - "8095:8089"
    environment:
      SPLUNK_PASSWORD: ${SPLUNK_PASSWORD}
      SPLUNK_GENERAL_TERMS: "--accept-sgt-current-at-splunk-com"
      SPLUNK_START_ARGS: "--accept-license"
      SPLUNK_ROLE: splunk_search_head
      SPLUNK_SEARCH_HEAD_URL: sh1,sh2,sh3
      SPLUNK_SEARCH_HEAD_CAPTAIN_URL: sh1
      SPLUNK_SHC_SECRET: ${SPLUNK_SHC_SECRET}
      SPLUNK_DEPLOYER_URL: dep1
      SPLUNK_INDEXER_URL: idx1,idx2,idx3
      SPLUNK_CLUSTER_MASTER_URL: cm1
      SPLUNK_IDXC_SECRET: ${SPLUNK_IDXC_SECRET}
    volumes:
    - sh1_etc:/opt/splunk/etc
    - sh1_var:/opt/splunk/var
    tty: true
    stdin_open: true
    restart: unless-stopped
  # -------------------------------
  # Search Head 2
  # -------------------------------
  sh2:
    image: splunk/splunk:9.0.3-openjdk11
    container_name: sh2
    hostname: sh2
    networks:
      - skynet
    ports:
      - "8006:8000"
      - "8096:8089"
    environment:
      SPLUNK_PASSWORD: ${SPLUNK_PASSWORD}
      SPLUNK_GENERAL_TERMS: "--accept-sgt-current-at-splunk-com"
      SPLUNK_START_ARGS: "--accept-license"
      SPLUNK_ROLE: splunk_search_head
      SPLUNK_SEARCH_HEAD_URL: sh1,sh2,sh3
      SPLUNK_SEARCH_HEAD_CAPTAIN_URL: sh1
      SPLUNK_SHC_SECRET: ${SPLUNK_SHC_SECRET}
      SPLUNK_DEPLOYER_URL: dep1
      SPLUNK_INDEXER_URL: idx1,idx2,idx3
      SPLUNK_CLUSTER_MASTER_URL: cm1
      SPLUNK_IDXC_SECRET: ${SPLUNK_IDXC_SECRET}
    volumes:
    - sh2_etc:/opt/splunk/etc
    - sh2_var:/opt/splunk/var
    tty: true
    stdin_open: true
    restart: unless-stopped
  # -------------------------------
  # Search Head 3
  # -------------------------------
  sh3:
    image: splunk/splunk:9.0.3-openjdk11
    container_name: sh3
    hostname: sh3
    networks:
      - skynet
    ports:
      - "8007:8000"
      - "8097:8089"
    environment:
      SPLUNK_PASSWORD: ${SPLUNK_PASSWORD}
      SPLUNK_GENERAL_TERMS: "--accept-sgt-current-at-splunk-com"
      SPLUNK_START_ARGS: "--accept-license"
      SPLUNK_ROLE: splunk_search_head
      SPLUNK_SEARCH_HEAD_URL: sh1,sh2,sh3
      SPLUNK_SEARCH_HEAD_CAPTAIN_URL: sh1
      SPLUNK_SHC_SECRET: ${SPLUNK_SHC_SECRET}
      SPLUNK_DEPLOYER_URL: dep1
      SPLUNK_INDEXER_URL: idx1,idx2,idx3
      SPLUNK_CLUSTER_MASTER_URL: cm1
      SPLUNK_IDXC_SECRET: ${SPLUNK_IDXC_SECRET}
    volumes:
    - sh3_etc:/opt/splunk/etc
    - sh3_var:/opt/splunk/var
    tty: true
    stdin_open: true
    restart: unless-stopped
  # -------------------------------
  # Deployer
  # -------------------------------
  dep1:
    image: splunk/splunk:9.0.3-openjdk11
    container_name: dep1
    hostname: dep1
    networks:
      - skynet
    ports:
      - "8008:8000"
      - "8098:8089"
    environment:
      SPLUNK_PASSWORD: ${SPLUNK_PASSWORD}
      SPLUNK_GENERAL_TERMS: "--accept-sgt-current-at-splunk-com"
      SPLUNK_START_ARGS: "--accept-license"
      SPLUNK_ROLE: splunk_deployer
      SPLUNK_SHC_SECRET: ${SPLUNK_SHC_SECRET}
      SPLUNK_SEARCH_HEAD_URL: sh1,sh2,sh3
      SPLUNK_INDEXER_URL: idx1,idx2,idx3
    volumes:
    - dep1_etc:/opt/splunk/etc
    - dep1_var:/opt/splunk/var
    tty: true
    stdin_open: true
    restart: unless-stopped
# -------------------------------
# Networks
# -------------------------------
networks:
  skynet:
    external: true
# -------------------------------
# Named Volumes
# -------------------------------
volumes:
  cm1_etc:
  cm1_var:
  idx1_etc:
  idx1_var:
  idx2_etc:
  idx2_var:
  idx3_etc:
  idx3_var:
  sh1_etc:
  sh1_var:
  sh2_etc:
  sh2_var:
  sh3_etc:
  sh3_var:
  dep1_etc:
  dep1_var:
